<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florist Boutique | Магазин квітів</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<header>
  <nav class="navbar">
      <div class="logo">FLORIST</div>
      <ul class="nav-links">
          <li><a href="/index" class="active">Головна</a></li>
          <li><a href="/catalog">Каталог</a></li>
          <li><a href="/delivery">Доставка</a></li>
          <li><a href="/contacts">Контакти</a></li>
      </ul>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
      <h1>Краса у кожній пелюстці</h1>
      <p>Створюємо букети, що говорять за вас.</p>
      <button class="btn">Обрати букет</button>

</section>

<section class="products">
  <h2>Наші бестселери</h2>
  <div class="product-grid">
      <div class="product-card">
          <div class="product-img" style="background-color: #fce4ec;">🌸</div>
          <h3>Ніжна Роза</h3>
          <p>950 грн</p>

      <div class="product-card">
          <div class="product-img" style="background-color: #f3e5f5;">🌿</div>
          <h3>Весняний Мікс</h3>
          <p>1200 грн</p>
          <button class="buy-btn">В кошик</button>
      </div>
      <div class="product-card">
          <div class="product-img" style="background-color: #e8f5e9;">🌻</div>
          <h3>Сонячний Настрій</h3>
          <p>800 грн</p>
          <button class="buy-btn">В кошик</button>

<footer>
  <p>&copy; 2026 Florist Boutique. Всі права захищені.</p>
