<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Товари</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/admin">🌸 Адмін</a>
    <a href="/admin/products/new" class="btn btn-success btn-sm">+ Додати товар</a>
</nav>
<div class="container mt-4">
    <table class="table table-hover">
        <thead><tr><th>#</th><th>Фото</th><th>Назва</th><th>Ціна</th><th>Залишок</th><th>Дії</th></tr></thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td><img th:src="${p.imageUrl}" style="width:50px;height:50px;object-fit:cover" class="rounded"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price} + ' ₴'"></td>
            <td th:text="${p.stock}"></td>
            <td>
                <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning">✏️</a>
                <form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-danger" onclick="return confirm('Видалити?')">🗑️</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
