<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Товари — Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="admin-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px">
        <h1 class="admin-page-title" style="margin:0">Товари</h1>
        <a href="/admin/products/new" class="btn-primary-gold">＋ Новий товар</a>
    </div>

    <div class="admin-card">
        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Фото</th>
                    <th>Назва</th>
                    <th class="hide-mobile">Категорія</th>
                    <th>Ціна</th>
                    <th class="hide-mobile">Залишок</th>
                    <th class="hide-mobile">Бейдж</th>
                    <th>Дії</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productPage.content}">
                    <td class="td-id" th:text="${p.id}"></td>
                    <td>
                        <img th:src="${p.imageUrl}" class="product-thumb" alt="">
                    </td>
                    <td style="font-weight:500" th:text="${p.name}"></td>
                    <td class="td-muted hide-mobile" th:text="${p.category}"></td>
                    <td class="td-price" th:text="${p.price} + ' ₴'"></td>
                    <td class="hide-mobile">
                            <span th:text="${p.stock}"
                                  th:class="${p.stock < 3 ? 'stock-badge stock-low' : 'stock-badge stock-ok'}">
                            </span>
                    </td>
                    <td class="hide-mobile">
                        <span th:if="${p.badge}" th:text="${p.badge}" class="product-badge"></span>
                    </td>
                    <td>
                        <div style="display:flex;gap:6px">
                            <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn-icon">✏</a>
                            <form th:action="@{/admin/products/delete/{id}(id=${p.id})}"
                                  method="post"
                                  onsubmit="return confirm('Видалити товар?')">
                                <button type="submit" class="btn-icon btn-icon--danger">✕</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <ul class="pagination" th:if="${productPage.totalPages > 1}">
        <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/products(page=${productPage.number - 1})}">‹</a>
        </li>
        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
            th:classappend="${i == productPage.number} ? 'active'">
            <a class="page-link" th:href="@{/admin/products(page=${i})}" th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/products(page=${productPage.number + 1})}">›</a>
        </li>
    </ul>
</div>
</body>
</html>
