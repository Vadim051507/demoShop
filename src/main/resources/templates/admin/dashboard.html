<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Адмін-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🌸 Адмін-панель</span>
    <div>
        <a href="/admin/products" class="btn btn-outline-light btn-sm me-2">Товари</a>
        <a href="/admin/orders" class="btn btn-outline-light btn-sm me-2">Замовлення</a>
        <a href="/logout" class="btn btn-danger btn-sm">Вийти</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-success p-3">
                <h5>Товарів</h5>
                <h2 th:text="${productCount}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-primary p-3">
                <h5>Замовлень</h5>
                <h2 th:text="${orderCount}">0</h2>
            </div>
        </div>
    </div>
    <h5>Останні замовлення</h5>
    <table class="table table-striped">
        <thead><tr><th>#</th><th>Клієнт</th><th>Сума</th><th>Статус</th><th>Дата</th></tr></thead>
        <tbody>
        <tr th:each="o : ${recentOrders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.clientName}"></td>
            <td th:text="${o.total} + ' ₴'"></td>
            <td th:text="${o.status}"></td>
            <td th:text="${#temporals.format(o.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
