<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Товар — Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="admin-wrap" style="max-width:680px">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:28px">
        <a href="/admin/products" class="btn-reset">← Назад</a>
        <h1 class="admin-page-title" style="margin:0;font-size:1.6rem"
            th:text="${product.id == null ? 'Новий товар' : product.name}"></h1>
    </div>

    <div class="form-card">
        <form th:action="@{/admin/products/save}" method="post" th:object="${product}">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label class="form-label-custom">Назва товару</label>
                <input type="text" th:field="*{name}" class="form-control-custom"
                       placeholder="Букет червоних троянд" required>
            </div>

            <div class="form-group">
                <label class="form-label-custom">Опис</label>
                <textarea th:field="*{description}" class="form-control-custom"
                          placeholder="Короткий опис товару..."></textarea>
            </div>

            <div class="form-row form-group">
                <div>
                    <label class="form-label-custom">Ціна (₴)</label>
                    <input type="number" th:field="*{price}" class="form-control-custom"
                           placeholder="950" required>
                </div>
                <div>
                    <label class="form-label-custom">Залишок</label>
                    <input type="number" th:field="*{stock}" class="form-control-custom"
                           placeholder="10" required>
                </div>
            </div>

            <div class="form-row form-group">
                <div>
                    <label class="form-label-custom">Категорія</label>
                    <select th:field="*{category}" class="form-control-custom">
                        <option value="bouquets">Букети</option>
                        <option value="tulips">Тюльпани</option>
                        <option value="plants">Рослини</option>
                        <option value="exotic">Екзотика</option>
                        <option value="compositions">Композиції</option>
                    </select>
                </div>
                <div>
                    <label class="form-label-custom">Бейдж</label>
                    <input type="text" th:field="*{badge}" class="form-control-custom"
                           placeholder="Хіт, Новинка...">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label-custom">Доступний для продажу</label>
                <div class="toggle-wrap">
                    <input type="checkbox" th:field="*{available}">
                    <span class="toggle-label">Показувати в каталозі</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label-custom">URL фото</label>
                <input type="text" th:field="*{imageUrl}" class="form-control-custom"
                       placeholder="https://..." id="imageUrlInput"
                       oninput="updatePreview(this.value)">
                <div class="image-preview-box" id="previewBox">
                    <img id="imagePreview"
                         th:src="${product.imageUrl != null ? product.imageUrl : ''}"
                         th:style="${product.imageUrl != null ? 'display:block' : 'display:none'}"
                         alt="preview">
                </div>
            </div>

            <button type="submit" class="btn-primary-gold" style="width:100%;justify-content:center;padding:14px">
                Зберегти товар
            </button>
        </form>
    </div>
</div>

<script>
    function updatePreview(url) {
        const img = document.getElementById('imagePreview');
        img.style.display = url ? 'block' : 'none';
        if (url) img.src = url;
    }
</script>
</body>
</html>
