<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редагування товару</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/admin/products">← Назад до товарів</a>
</nav>
<div class="container mt-4" style="max-width:600px">
    <h4 th:text="${product.id == null ? 'Новий товар' : 'Редагування: ' + product.name}"></h4>
    <form th:action="@{/admin/products/save}" method="post" th:object="${product}">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Назва</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Опис</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Ціна (₴)</label>
                <input type="number" th:field="*{price}" class="form-control" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Залишок</label>
                <input type="number" th:field="*{stock}" class="form-control" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Категорія</label>
            <select th:field="*{category}" class="form-select">
                <option value="bouquets">Букети</option>
                <option value="tulips">Тюльпани</option>
                <option value="plants">Рослини</option>
                <option value="exotic">Екзотика</option>
                <option value="compositions">Композиції</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">URL фото</label>
            <input type="text" th:field="*{imageUrl}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Бейдж (необов'язково)</label>
            <input type="text" th:field="*{badge}" class="form-control" placeholder="Хіт, Новинка, Преміум...">
        </div>
        <button type="submit" class="btn btn-success w-100">Зберегти</button>
    </form>
</div>
</body>
</html>
