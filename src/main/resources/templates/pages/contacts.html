<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | Florist Boutique</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- <link rel="stylesheet" href="../../static/css/style.css"> -->
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">FLORIST</div>
        <ul class="nav-links">
            <li><a href="/index">Головна</a></li>
            <li><a href="/catalog">Каталог</a></li>
            <li><a href="#">Доставка</a></li>
            <li><a href="/contacts" class="active">Контакти</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="contacts-page">
        <div class="container">
            <h2>Зв'яжіться з нами</h2>
            <p class="subtitle">Ми завжди раді допомогти вам обрати ідеальний букет</p>

            <div class="contacts-wrapper">
                <div class="contact-info">
                    <div class="info-item">
                        <span class="icon">📞</span>
                        <div>
                            <h3>Телефон</h3>
                            <a href="tel:+380966008376" class="phone-link">096 600 83 76</a>
                            <p>Щодня з 09:00 до 21:00</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <span class="icon">📍</span>
                        <div>
                            <h3>Адреса</h3>
                            <p>м. Київ, вул. Квіткова, 12</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <span class="icon">✉️</span>
                        <div>
                            <h3>Email</h3>
                            <p>wadimlikar@gmail.com</p>
                        </div>
                    </div>
                </div>

                <div class="contact-form-container">
                    <form class="contact-form">
                        <input type="text" placeholder="Ваше ім'я" required>
                        <input type="email" placeholder="Ваш Email" required>
                        <textarea placeholder="Ваше повідомлення" rows="5" required></textarea>
                        <button type="submit" class="btn">Надіслати</button>
                    </form>
                </div>
            </div>

            <div class="map-placeholder">
                <iframe
                        src="https://www.google.com/maps?q=Kyiv,Ukraine&output=embed"
                        width="100%"
                        height="400"
                        style="border:0;"
                        loading="lazy">
                </iframe>
            </div>

        </div>
    </section>
</main>

</body>
</html>
