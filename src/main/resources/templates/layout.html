<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content, pageJS)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d0d">
    <title th:replace="${title}">Florist Boutique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
    <link rel="stylesheet" th:href="@{/css/delivery.css}">
    <link rel="stylesheet" th:href="@{/css/contacts.css}">
</head>
<body>

<nav>
    <a class="nav-logo" th:href="@{/}">FLOR<span>✦</span>IST</a>

    <!-- Hamburger — видимий тільки на мобільному -->
    <button class="burger" id="burger" aria-label="Меню">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <ul class="nav-links" id="nav-links">
        <li><a th:href="@{/}"        th:classappend="${activePage == 'home'}     ? 'active'">Головна</a></li>
        <li><a th:href="@{/catalog}" th:classappend="${activePage == 'catalog'}  ? 'active'">Каталог</a></li>
        <li><a th:href="@{/delivery}"th:classappend="${activePage == 'delivery'} ? 'active'">Доставка</a></li>
        <li><a th:href="@{/contacts}"th:classappend="${activePage == 'contacts'} ? 'active'">Контакти</a></li>
    </ul>

    <button class="nav-cart" onclick="toggleCart()">
        🛒 Кошик
        <span class="cart-count" id="cart-count">0</span>
    </button>
</nav>

<main>
    <th:block th:replace="${content}"/>
</main>

<footer class="footer">
    <div class="footer-logo">FLOR<span>✦</span>IST</div>
    <p class="footer-copy">© 2026 Florist Boutique. Всі права захищені.</p>
    <ul class="footer-links">
        <li><a th:href="@{/catalog}">Каталог</a></li>
        <li><a th:href="@{/delivery}">Доставка</a></li>
        <li><a th:href="@{/contacts}">Контакти</a></li>
    </ul>
</footer>

<div class="cart-overlay" id="cart-overlay"></div>
<div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
        <h2>Кошик</h2>
        <button class="cart-close" id="cart-close">✕</button>
    </div>
    <div class="cart-items" id="cart-items">
        <div class="cart-empty">
            <div class="cart-empty-icon">🌸</div>
            <p>Кошик порожній</p>
        </div>
    </div>
    <div class="cart-footer">
        <div class="cart-total">
            <span class="cart-total-label">Сума</span>
            <span class="cart-total-price" id="cart-total">0 грн</span>
        </div>
        <button class="checkout-btn">Оформити замовлення</button>
    </div>
</div>


<script th:src="@{/js/cart.js}"></script>

<!-- Hamburger JS -->
<script>
    const burger = document.getElementById('burger');
    const navLinks = document.getElementById('nav-links');

    burger.addEventListener('click', () => {
        burger.classList.toggle('open');
        navLinks.classList.toggle('open');
        document.body.style.overflow = navLinks.classList.contains('open') ? 'hidden' : '';
    });

    // Закриваємо меню при кліку на посилання
    navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            burger.classList.remove('open');
            navLinks.classList.remove('open');
            document.body.style.overflow = '';
        });
    });
</script>

<th:block th:replace="${pageJS}" th:if="${pageJS != null}"/>

</body>
</html>
